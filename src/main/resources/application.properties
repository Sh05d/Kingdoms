spring.application.name=Kingdom

spring.datasource.url=${DB_URL:jdbc:mysql://database-1.cl680oigmxa2.eu-central-1.rds.amazonaws.com:3306/Data}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin1234}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}

spring.web.error.include-message=always
spring.web.error.include-stacktrace=never

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.config.import=optional:classpath:application-local.properties

openai.enabled=${OPENAI_ENABLED:true}
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.5}
openai.responses-url=${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}

twilio.enabled=${TWILIO_ENABLED:true}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
twilio.validate-signature=${TWILIO_VALIDATE_SIGNATURE:false}

mailtrap.enabled=${MAILTRAP_API_ENABLED:true}
mailtrap.api-token=${MAILTRAP_API_TOKEN:}
mailtrap.api-url=${MAILTRAP_API_URL:https://send.api.mailtrap.io/api/send}
mailtrap.from-email=${MAILTRAP_FROM_EMAIL:no-reply@wejdanhealth.com}
mailtrap.from-name=${MAILTRAP_FROM_NAME:Kingdoms}

n8n.webhook.url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook/kingdom-message}

strava.enabled=${STRAVA_ENABLED:false}
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
strava.refresh-token=${STRAVA_REFRESH_TOKEN:}
strava.token-url=${STRAVA_TOKEN_URL:https://www.strava.com/api/v3/oauth/token}
strava.activities-url=${STRAVA_ACTIVITIES_URL:https://www.strava.com/api/v3/athlete/activities}
strava.scope=${STRAVA_SCOPE:activity:read_all}
strava.authorize-url=${STRAVA_AUTHORIZE_URL:https://www.strava.com/oauth/authorize}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:8080/api/v1/verify/fitness/callback}

neotek.enabled=${NEOTEK_ENABLED:false}
neotek.base-url=${NEOTEK_BASE_URL:https://test.api.neotek.sa}
neotek.token-url=${NEOTEK_TOKEN_URL:https://test.api.neotek.sa/oauth2security/oauth2/token}
neotek.client-id=${NEOTEK_CLIENT_ID:}
neotek.client-secret=${NEOTEK_CLIENT_SECRET:}
neotek.scope-read=${NEOTEK_SCOPE_READ:single_api}
neotek.scope-connect=${NEOTEK_SCOPE_CONNECT:ob_connect}
neotek.accounts-link-path=${NEOTEK_ACCOUNTS_LINK_PATH:/accounts-information/v1/accounts-links}
neotek.transactions-path=${NEOTEK_TRANSACTIONS_PATH:/single-api-aggregator/v1/profiles/transactions}
neotek.accounts-path=${NEOTEK_ACCOUNTS_PATH:/single-api-aggregator/v1/profiles/accounts}
neotek.financial-institution-id=${NEOTEK_FI_ID:SAIBCSARI}
neotek.demo-psu-id=${NEOTEK_DEMO_PSU_ID:20112}
neotek.redirect-uri=${NEOTEK_REDIRECT_URI:http://localhost:8080/oauth/callback/neotek}

volunteer.match-threshold=${VOLUNTEER_MATCH_THRESHOLD:0.5}

steam.api.key=${SteamKey:}
google.books.base-url=https://www.googleapis.com/books/v1
google.books.api.key=${GOOGLE_BOOKS_API_KEY:}
alquran.cloud.base-url=https://api.alquran.cloud/v1
quran.tafseer.base-url=http://api.quran-tafseer.com
